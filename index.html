<style>
:root{
  --primary:#d94f00;--primary-dark:#a63200;--primary-light:#f06020;
  --accent:#c0392b;--accent-light:#e74c3c;
  --bg:#f0f2f5;--card:#fff;
  --text:#1a1a2e;--text-light:#6b7280;
  --border:#e5e7eb;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --shadow:0 2px 12px rgba(26,35,126,.10);
  --shadow-lg:0 4px 24px rgba(26,35,126,.18);
  --radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
#app{height:100%;display:flex;flex-direction:column;}

/* NAV */
.top-nav{background:linear-gradient(135deg,#7b1a00 0%,#c94000 55%,#e8671a 100%);color:#fff;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);flex-shrink:0;}
.nav-title{font-size:17px;font-weight:700;letter-spacing:.3px;}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;backdrop-filter:blur(4px);}
.nav-btn:active{opacity:.75;}
.bottom-nav{background:#fff;display:flex;align-items:center;justify-content:space-around;height:64px;border-top:1px solid var(--border);position:sticky;bottom:0;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08);flex-shrink:0;}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:6px 0;color:var(--text-light);font-size:10px;font-weight:600;transition:color .15s;}
.bottom-nav button.active{color:var(--primary);}
.bottom-nav button .icon{font-size:22px;}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px;}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;}
.card-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:12px;}

/* JOB CARD */
.job-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;cursor:pointer;transition:box-shadow .2s,transform .1s;border-left:4px solid var(--primary);}
.job-card:active{transform:scale(.98);box-shadow:var(--shadow-lg);}
.job-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.job-number{font-size:15px;font-weight:800;color:var(--primary);}
.job-customer{font-size:17px;font-weight:700;color:var(--text);margin-bottom:10px;}
.job-detail{font-size:13px;color:var(--text-light);margin-bottom:4px;}
.job-detail span{font-weight:600;color:var(--text);}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.badge-new{background:#dbeafe;color:#1d4ed8;}
.badge-assigned{background:#e0e7ff;color:#4338ca;}
.badge-accepted{background:#ede9fe;color:#6d28d9;}
.badge-in_progress{background:#fef3c7;color:#b45309;}
.badge-completed{background:#d1fae5;color:#065f46;}
.badge-cancelled{background:#fee2e2;color:#991b1b;}
.badge-failed{background:#fce7f3;color:#9d174d;}
.badge-pending{background:#f3f4f6;color:#6b7280;}
.badge-active{background:#d1fae5;color:#065f46;}
.badge-inactive{background:#f3f4f6;color:#6b7280;}
.badge-busy{background:#fef3c7;color:#b45309;}
.badge-offline{background:#fee2e2;color:#991b1b;}
.badge-pickup_scanned{background:#dbeafe;color:#1d4ed8;}
.badge-delivery_scanned{background:#d1fae5;color:#065f46;}
.badge-damaged{background:#fee2e2;color:#991b1b;}
.badge-missing{background:#fce7f3;color:#9d174d;}

/* BUTTONS */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:opacity .15s,transform .1s;letter-spacing:.3px;}
.btn:active{opacity:.85;transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,#d94f00 0%,#c0392b 100%);color:#fff;}
.btn-success{background:linear-gradient(135deg,#059669,#10b981);color:#fff;}
.btn-warning{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;}
.btn-secondary{background:#f3f4f6;color:var(--primary);border:2px solid var(--border);}
.btn-info{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;}
.btn-sm{padding:10px;font-size:14px;margin-bottom:8px;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* FORMS */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:5px;}
.form-control{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:#fff;transition:border-color .2s;-webkit-appearance:none;font-family:inherit;}
.form-control:focus{outline:none;border-color:var(--primary);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
textarea.form-control{resize:vertical;}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.toggle-label{font-size:15px;font-weight:500;}
.toggle{position:relative;width:50px;height:28px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:28px;transition:.3s;}
.toggle-slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--primary);}
.toggle input:checked+.toggle-slider:before{transform:translateX(22px);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 14px;text-align:center;}
.stat-number{font-size:32px;font-weight:800;color:var(--primary);}
.stat-label{font-size:12px;color:var(--text-light);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}

/* FAB */
.fab{position:fixed;bottom:80px;right:20px;z-index:200;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#d94f00,#c0392b);color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(26,35,126,.4);display:flex;align-items:center;justify-content:center;transition:transform .1s;}
.fab:active{transform:scale(.9);}

/* MISC */
.divider{height:1px;background:var(--border);margin:14px 0;}
.section-header{font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f3f4f6;}
.detail-row:last-child{border-bottom:none;}
.detail-key{font-size:13px;color:var(--text-light);font-weight:500;flex:1;}
.detail-val{font-size:14px;font-weight:600;color:var(--text);flex:1.5;text-align:right;word-break:break-word;}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;flex-direction:column;gap:14px;}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* EMPTY */
.empty-state{text-align:center;padding:48px 16px;}
.empty-icon{font-size:56px;margin-bottom:12px;}
.empty-state p{color:var(--text-light);font-size:15px;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--primary-dark);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;transition:transform .3s ease;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success{background:#065f46;}
#toast.error{background:#991b1b;}
#toast.info{background:#1d4ed8;}

/* LOGIN */
.login-page{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;background:linear-gradient(160deg,#7b1a00 0%,#c94000 45%,#e8671a 100%);}
.login-logo{font-size:72px;margin-bottom:4px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.3));}
.login-app-name{color:#fff;font-size:24px;font-weight:800;letter-spacing:.5px;text-align:center;}
.login-company{color:rgba(255,255,255,.7);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.login-card h2{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:20px;text-align:center;}

/* DEMO ACCOUNTS */
.demo-accounts{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:14px;margin-top:16px;width:100%;max-width:400px;}
.demo-accounts h4{color:#fff;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:700;}
.demo-btn{display:block;width:100%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;text-align:left;transition:background .15s;}
.demo-btn:last-child{margin-bottom:0;}
.demo-btn:active{background:rgba(255,255,255,.25);}
.demo-role{float:right;font-size:11px;opacity:.75;font-weight:400;}

/* SCANNER */
.scan-result-card{border-radius:12px;padding:16px;margin-bottom:12px;}
.scan-found{background:#f0fdf4;border:2px solid #bbf7d0;}
.scan-error{background:#fff1f2;border:2px solid #fecdd3;}

/* SIG PAD */
#sig-canvas{border:2px dashed var(--border);border-radius:10px;width:100%;height:180px;background:#fafafa;touch-action:none;}

/* PHOTO */
.photo-upload{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#fafafa;}
.photo-preview{width:100%;border-radius:10px;margin-top:10px;max-height:200px;object-fit:cover;}

/* TRUCK / CUSTOMER CARDS */
.truck-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border-left:4px solid var(--accent);}
.customer-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border-left:4px solid var(--success);}

/* DRIVER CARD */
.driver-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border-left:4px solid var(--info);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:16px;}

.hidden{display:none!important;}
@media(min-width:480px){.page,.bottom-nav{max-width:480px;margin-left:auto;margin-right:auto;}}
</style>

<script>
// ═══════════════════════════════════════════════════════════════
//  GALAXY DISPATCH APP  –  Galaxy Haulage
//  Self-contained: localStorage database, no Firebase required
// ═══════════════════════════════════════════════════════════════

// ── UTILITIES ────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const ts  = () => new Date().toISOString();
const fmtDate = iso => iso ? new Date(iso).toLocaleString('en-AU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const fmtDateShort = iso => iso ? new Date(iso).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}) : '—';

function showToast(msg, type=''){
  const t=$('toast'); t.textContent=msg;
  t.className=type?`show ${type}`:'show';
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='',3000);
}

function badge(status){
  const s=(status||'').replace(/\s+/g,'_').toLowerCase();
  return `<span class="badge badge-${s}">${(status||'').replace(/_/g,' ')}</span>`;
}

function genJobNum(){
  const n=String(DB.meta('jobCounter')+1).padStart(4,'0');
  DB.setMeta('jobCounter', DB.meta('jobCounter')+1);
  return `GH-${n}`;
}

// ── LOCAL DATABASE ────────────────────────────────────────────
const DB = {
  _key: k => `gx_${k}`,
  get(col){ try{ return JSON.parse(localStorage.getItem(this._key(col))||'[]'); }catch(e){ return []; } },
  set(col,data){ localStorage.setItem(this._key(col), JSON.stringify(data)); },
  meta(k){ try{ return JSON.parse(localStorage.getItem(this._key('meta_'+k))||'0'); }catch(e){ return 0; } },
  setMeta(k,v){ localStorage.setItem(this._key('meta_'+k), JSON.stringify(v)); },

  // CRUD
  all(col){ return this.get(col); },
  find(col,id){ return this.get(col).find(r=>r.id===id)||null; },
  where(col,field,val){ return this.get(col).filter(r=>r[field]===val); },
  whereIn(col,field,vals){ return this.get(col).filter(r=>vals.includes(r[field])); },

  add(col,data){
    const rows=this.get(col);
    const doc={...data, id: data.id||uid(), created_at: data.created_at||ts(), updated_at: ts()};
    rows.unshift(doc);
    this.set(col,rows);
    return doc;
  },
  update(col,id,patch){
    const rows=this.get(col);
    const i=rows.findIndex(r=>r.id===id);
    if(i<0) return null;
    rows[i]={...rows[i],...patch, updated_at:ts()};
    this.set(col,rows);
    return rows[i];
  },
  remove(col,id){
    const rows=this.get(col).filter(r=>r.id!==id);
    this.set(col,rows);
  },
  query(col,{orderBy,order,limit,filters}={}){
    let rows=this.get(col);
    if(filters) filters.forEach(([f,op,v])=>{
      if(op==='==') rows=rows.filter(r=>r[f]===v);
      if(op==='in') rows=rows.filter(r=>(v||[]).includes(r[f]));
    });
    if(orderBy) rows.sort((a,b)=>{
      const av=a[orderBy]||''; const bv=b[orderBy]||'';
      return order==='asc'? (av>bv?1:-1):(av<bv?1:-1);
    });
    if(limit) rows=rows.slice(0,limit);
    return rows;
  }
};

// ── SEED DATA ─────────────────────────────────────────────────

  // Users
  const users=[
    {id:'u_admin',  full_name:'Alex Admin',      email:'admin@galaxyhaulage.com.au',    phone:'0411 111 111', role:'admin',      truck_rego:'',        status:'active',   password:'admin123'},
    {id:'u_disp',   full_name:'Diana Dispatcher', email:'dispatch@galaxyhaulage.com.au', phone:'0422 222 222', role:'dispatcher', truck_rego:'',        status:'active',   password:'disp123'},
    {id:'u_drv1',   full_name:'Dave Driver',      email:'dave@galaxyhaulage.com.au',     phone:'0433 333 333', role:'driver',     truck_rego:'GH1234',  status:'active',   password:'driver123'},
    {id:'u_drv2',   full_name:'Sarah Driver',     email:'sarah@galaxyhaulage.com.au',    phone:'0444 444 444', role:'driver',     truck_rego:'GH5678',  status:'active',   password:'driver456'},
  ];
  users.forEach(u=>DB.add('users',u));

  // Trucks
  DB.add('trucks',{id:'t1',truck_rego:'GH1234',truck_type:'Semi Trailer',status:'active',driver_name:'Dave Driver',odometer:145230,registration_expiry:'2025-06-30',insurance_expiry:'2025-12-31'});
  DB.add('trucks',{id:'t2',truck_rego:'GH5678',truck_type:'Rigid Truck',status:'active',driver_name:'Sarah Driver',odometer:87500,registration_expiry:'2025-09-15',insurance_expiry:'2025-12-31'});
  DB.add('trucks',{id:'t3',truck_rego:'GH9999',truck_type:'B-Double',status:'inactive',driver_name:'',odometer:220100,registration_expiry:'2024-11-01',insurance_expiry:'2024-12-01'});

  // Customers
  DB.add('customers',{id:'c1',customer_name:'Acme Logistics',address:'12 Warehouse Rd, Wetherill Park NSW 2164',contact_person:'John Smith',phone:'02 9615 0001',email:'john@acmelogistics.com.au',special_instructions:'Forklift available on site'});
  DB.add('customers',{id:'c2',customer_name:'BlueStar Distribution',address:'88 Industrial Ave, Dandenong VIC 3175',contact_person:'Lisa Chen',phone:'03 9708 0002',email:'lisa@bluestar.com.au',special_instructions:'Call 30 mins before arrival'});
  DB.add('customers',{id:'c3',customer_name:'Harbour Freight Co',address:'5 Port Access Rd, Port Botany NSW 2036',contact_person:'Tom Nguyen',phone:'02 9316 0003',email:'tom@harbourfreight.com.au',special_instructions:'Security check required. Photo ID needed.'});

  // Jobs
  DB.setMeta('jobCounter',0);
  const j1id='j1'; const j2id='j2'; const j3id='j3'; const j4id='j4';

// ── APP STATE ─────────────────────────────────────────────────
let S = {
  user: null,          // logged-in user object
  page: 'login',
  history: [],
  jobId: null,         // selected job id
  podPhotoUrl: null,
  podDocPhotoUrl: null,
};

function navigate(page, opts={}){
  S.history.push(S.page);
  if(opts.jobId) S.jobId=opts.jobId;
  S.page=page;
  render();
}
function goBack(){
  if(S.history.length){ S.page=S.history.pop(); render(); }
}

// ── AUTH ──────────────────────────────────────────────────────
function login(email, password){
  const users=DB.all('users');
  const u=users.find(x=>x.email.toLowerCase()===email.toLowerCase() && x.password===password);
  if(!u){ showToast('Invalid email or password','error'); return false; }
  S.user=u;
  S.page= (u.role==='driver') ? 'driverJobs' : 'dashboard';
  S.history=[];
  render();
  return true;
}
function logout(){ S.user=null; S.page='login'; S.history=[]; render(); }

function bindLogin(){
  $('li_btn').onclick=()=>{
    const e=$('li_email').value.trim();
    const p=$('li_pass').value;
    if(!e||!p){$('li_err').textContent='Please enter email and password.';return;}
    if(!login(e,p)){$('li_err').textContent='Invalid email or password.';}
  };
  $('li_email').addEventListener('keydown',ev=>{ if(ev.key==='Enter') $('li_pass').focus(); });
  $('li_pass').addEventListener('keydown',ev=>{ if(ev.key==='Enter') $('li_btn').click(); });
}
function quickLogin(e,p){

}

function fillCustomer(custId){
  if(!custId) return;
  const c=DB.find('customers',custId);
  if(!c) return;
  const el=id=>document.getElementById(id);
  el('cj_customer').value=c.customer_name||'';
  el('cj_pu_addr').value=c.address||'';
  el('cj_pu_contact').value=c.contact_person||'';
  el('cj_pu_phone').value=c.phone||'';
  if(c.special_instructions) el('cj_instr').value=c.special_instructions;
}

function fillDriverTruck(driverId){
  if(!driverId) return;
  const u=DB.find('users',driverId);
  if(!u) return;
  if(u.truck_rego){
    const sel=document.getElementById('cj_truck');
    if(sel){ for(let o of sel.options){ if(o.value===u.truck_rego){ o.selected=true; break; } } }
    const t=DB.where('trucks','truck_rego',u.truck_rego)[0];
    if(t) document.getElementById('cj_ttype').value=t.truck_type||'';
  }
}

function createJob(){
  const g=id=>document.getElementById(id)?.value.trim();
  const customer=g('cj_customer');
  const pu_addr=g('cj_pu_addr');
  const dl_addr=g('cj_dl_addr');
  if(!customer||!pu_addr||!dl_addr){ showToast('Fill in required fields (*)','error'); return; }

  const driverId=g('cj_driver')||'';
  const driverUser=driverId?DB.find('users',driverId):null;
  const truckRego=g('cj_truck')||'';
  const truck=truckRego?DB.where('trucks','truck_rego',truckRego)[0]:null;

  const btn=$('cj_btn'); btn.disabled=true; btn.textContent='Creating…';

  const job=DB.add('jobs',{
    job_number: genJobNum(),
    customer_name: customer,
    pickup_address: pu_addr,
    delivery_address: dl_addr,
    pickup_contact: g('cj_pu_contact'),
    pickup_phone: g('cj_pu_phone'),
    delivery_contact: g('cj_dl_contact'),
    delivery_phone: g('cj_dl_phone'),
    pallet_count: parseInt(document.getElementById('cj_pallets')?.value)||0,
    total_items: parseInt(document.getElementById('cj_items')?.value)||0,
    total_weight: parseFloat(document.getElementById('cj_weight')?.value)||0,
    freight_type: g('cj_ftype'),
    tailgate_required: document.getElementById('cj_tail')?.checked||false,
    forklift_available: document.getElementById('cj_fork')?.checked||false,
    special_instructions: g('cj_instr'),
    assigned_driver: driverUser?driverUser.full_name:'',
    driver_id: driverId,
    truck_rego: truckRego,
    truck_type: truck?truck.truck_type:'',
    status: driverId?'assigned':'new',
    pickup_status:'pending',delivery_status:'pending',
    scan_summary:'',pickup_photo:'',delivery_photo:'',
    pod_signature:'',pod_receiver_name:'',notes:'',
    gps_pickup_lat:0,gps_pickup_lng:0,gps_delivery_lat:0,gps_delivery_lng:0,
    created_by: S.user.id,
    completed_at: null,
  });

  showToast('Job Created Successfully ✓','success');
  S.history=[];
  navigate('jobDetails',{jobId:job.id});
}

  showToast(`Status updated: ${status.replace('_',' ')}`,'success');
  renderJobDetails($('pc'));
};

window.autoFillTruck=function(driverId){
  if(!driverId) return;
  const u=DB.find('users',driverId);
  if(u&&u.truck_rego){
    const sel=$('jd_truck');
    if(sel){ for(let o of sel.options) if(o.value===u.truck_rego){ o.selected=true; break; } }
    const t=DB.where('trucks','truck_rego',u.truck_rego)[0];
    if(t) $('jd_ttype').value=t.truck_type||'';
  }
};

window.saveAssignment=function(){
  const driverId=$('jd_driver')?.value||'';
  const rego=$('jd_truck')?.value||'';
  const ttype=$('jd_ttype')?.value||'';
  const driverUser=driverId?DB.find('users',driverId):null;
  DB.update('jobs',S.jobId,{
    driver_id:driverId, assigned_driver:driverUser?driverUser.full_name:'',
    truck_rego:rego, truck_type:ttype,
    status: driverId?'assigned':'new',
  });
  showToast('Assignment saved ✓','success');
  renderJobDetails($('pc'));
};

window.genBarcode=function(){
  const j=DB.find('jobs',S.jobId);
  if(!j) return;
  const existing=DB.where('job_items','job_id',S.jobId);
  const num=String(existing.length+1).padStart(3,'0');
  $('ai_barcode').value=`${j.job_number}-${num}`;
};

function addItem(){
  const name=$('ai_name').value.trim();
  const barcode=$('ai_barcode').value.trim();
  if(!name||!barcode){ showToast('Item name and barcode required','error'); return; }
  const j=DB.find('jobs',S.jobId);
  const existing=DB.where('job_items','job_id',S.jobId);
  DB.add('job_items',{
    job_id:S.jobId, job_number:j?j.job_number:'',
    item_number:String(existing.length+1).padStart(3,'0'),
    item_name:name, barcode, barcode_type:$('ai_btype').value,
    item_type:$('ai_itype').value,
    item_weight:parseFloat($('ai_weight').value)||0,
    item_status:'pending',
    scanned_pickup:false,scanned_delivery:false,
    pickup_scanned_at:null,delivery_scanned_at:null,
    pickup_scanned_by:'',delivery_scanned_by:'',
    issue_status:'none',issue_notes:'',photo_url:'',
  });
  showToast('Item added ✓','success');
  goBack();
}

// ── SCANNER ───────────────────────────────────────────────────
let qrScanner=null;

function renderScanner(el){
  el.innerHTML=`
    <div class="card">
      <div class="card-title">📷 Barcode Scanner</div>
      <p style="font-size:13px;color:var(--text-light);margin-bottom:14px;">Point the camera at a barcode or QR code on a freight item.</p>
      <div id="scanner-container" style="width:100%;max-width:400px;margin:0 auto;"></div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-primary btn-sm" id="scanStartBtn">▶ Start Camera</button>
        <button class="btn btn-secondary btn-sm" id="scanStopBtn">⏹ Stop</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">✏️ Manual Entry</div>
      <div style="display:flex;gap:8px;">
        <input class="form-control" id="manual_bc" placeholder="Type or paste barcode…" style="flex:1;"/>
        <button class="btn btn-primary btn-sm btn-inline" onclick="lookupBarcode($('manual_bc').value.trim())">🔍</button>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--text-light);">Try: GH0001-001 · GH0001-002 · GH0002-001</div>
    </div>
    <div id="scan_result"></div>
  `;
  $('scanStartBtn').onclick=startScanner;
  $('scanStopBtn').onclick=stopScanner;
}

function startScanner(){
  if(qrScanner) stopScanner();
  qrScanner=new Html5Qrcode('scanner-container');
  qrScanner.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:280,height:160}},
    txt=>{ stopScanner(); $('manual_bc').value=txt; lookupBarcode(txt); },
    ()=>{}
  ).catch(err=>showToast('Camera error: '+err,'error'));
}

function stopScanner(){
  if(qrScanner){ qrScanner.stop().catch(()=>{}); qrScanner=null; }
}

function lookupBarcode(bc){
  if(!bc){ showToast('Enter a barcode','error'); return; }
  const res=$('scan_result'); if(!res) return;
  const items=DB.where('job_items','barcode',bc);
  if(!items.length){
    res.innerHTML=`<div class="scan-result-card scan-error"><p style="font-weight:700;color:#dc2626;font-size:16px;">❌ Not Found</p><p style="font-size:13px;color:var(--text-light);margin-top:4px;">No item matched barcode: <strong>${bc}</strong></p></div>`;
    return;
  }
  const it=items[0];
  const job=DB.find('jobs',it.job_id);
  res.innerHTML=`
    <div class="scan-result-card scan-found">
      <p style="font-weight:800;font-size:16px;color:#059669;margin-bottom:8px;">✅ Item Found</p>
      <div class="detail-row"><span class="detail-key">Job #</span><span class="detail-val">${it.job_number}</span></div>
      <div class="detail-row"><span class="detail-key">Customer</span><span class="detail-val">${job?job.customer_name:'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Item</span><span class="detail-val">${it.item_name}</span></div>
      <div class="detail-row"><span class="detail-key">Barcode</span><span class="detail-val">${it.barcode}</span></div>
      <div class="detail-row"><span class="detail-key">Type</span><span class="detail-val">${it.item_type||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Weight</span><span class="detail-val">${it.item_weight} kg</span></div>
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val">${badge(it.item_status)}</span></div>
      <div class="detail-row"><span class="detail-key">Pickup Scan</span><span class="detail-val">${it.scanned_pickup?'✅ '+fmtDate(it.pickup_scanned_at):'⬜ Not yet'}</span></div>
      <div class="detail-row"><span class="detail-key">Delivery Scan</span><span class="detail-val">${it.scanned_delivery?'✅ '+fmtDate(it.delivery_scanned_at):'⬜ Not yet'}</span></div>
      <div class="divider"></div>
      <div class="btn-row" style="margin-bottom:8px;">
        <button class="btn btn-success btn-sm" onclick="markScan('${it.id}','pickup')">📦 Pickup Scan</button>
        <button class="btn btn-primary btn-sm" onclick="markScan('${it.id}','delivery')">🏁 Delivery Scan</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-warning btn-sm" onclick="markIssue('${it.id}','damaged')">⚠️ Damaged</button>
        <button class="btn btn-danger btn-sm" onclick="markIssue('${it.id}','missing')">❓ Missing</button>
      </div>
      ${it.job_id?`<button class="btn btn-secondary btn-sm" style="margin-top:8px;" onclick="navigate('jobDetails',{jobId:'${it.job_id}'})">📄 Open Job</button>`:''}
    </div>`;
}

window.markScan=function(itemId,type){
  const now=new Date().toISOString();
  const patch=type==='pickup'
    ?{scanned_pickup:true,pickup_scanned_at:now,pickup_scanned_by:S.user.id,item_status:'pickup_scanned'}
    :{scanned_delivery:true,delivery_scanned_at:now,delivery_scanned_by:S.user.id,item_status:'delivery_scanned'};
  DB.update('job_items',itemId,patch);
  showToast(`${type==='pickup'?'Pickup':'Delivery'} scan recorded ✓`,'success');
  lookupBarcode($('manual_bc')?.value.trim()||'');
};

window.markIssue=function(itemId,issue){
  DB.update('job_items',itemId,{issue_status:issue,item_status:issue});
  showToast(`Item marked as ${issue}`,'success');
  lookupBarcode($('manual_bc')?.value.trim()||'');
};

    </div>

    <div class="card">
      <div class="card-title">📸 Delivery Photo</div>
      <div class="photo-upload" onclick="$('pod_photo_in').click()">
        <div style="font-size:36px;">📸</div>
        <p style="font-size:13px;color:var(--text-light);margin-top:6px;">Tap to take or upload a delivery photo</p>
        <img id="pod_photo_prev" style="width:100%;border-radius:10px;margin-top:10px;max-height:200px;object-fit:cover;display:none;"/>
      </div>
      <input type="file" id="pod_photo_in" accept="image/*" capture="environment" style="display:none;" onchange="previewPodPhoto(this,'pod_photo_prev','podPhotoUrl')"/>
    </div>

    <div class="card">
      <div class="card-title">📄 POD Document Photo</div>
      <div class="photo-upload" onclick="$('pod_doc_in').click()">
        <div style="font-size:36px;">📄</div>
        <p style="font-size:13px;color:var(--text-light);margin-top:6px;">Photograph the delivery docket / consignment note</p>
        <img id="pod_doc_prev" style="width:100%;border-radius:10px;margin-top:10px;max-height:200px;object-fit:cover;display:none;"/>
      </div>
      <input type="file" id="pod_doc_in" accept="image/*" capture="environment" style="display:none;" onchange="previewPodPhoto(this,'pod_doc_prev','podDocPhotoUrl')"/>
    </div>

    <button class="btn btn-success" id="pod_save_btn">💾 Save Proof of Delivery</button>
    <div style="height:16px;"></div>
  `;

  // Init signature pad
  requestAnimationFrame(()=>{
    const canvas=$('sig-canvas');
    if(canvas){ canvas.width=canvas.offsetWidth; canvas.height=180; sigPad=new SignaturePad(canvas,{backgroundColor:'#fafafa',penColor:'#1a237e'}); }
  });

  $('pod_save_btn').onclick=savePOD;
}

window.previewPodPhoto=function(input,previewId,stateKey){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=$(previewId);
    if(img){ img.src=e.target.result; img.style.display='block'; }
    S[stateKey]=e.target.result;
  };
  reader.readAsDataURL(file);
};

function savePOD(){
  const receiver=$('pod_receiver')?.value.trim();
  if(!receiver){ showToast('Receiver name required','error'); return; }
  if(!S.jobId){ showToast('No job selected — go to a job first','error'); return; }
  const btn=$('pod_save_btn'); btn.disabled=true; btn.textContent='Saving…';
  try{
    const sigData=sigPad&&!sigPad.isEmpty()?sigPad.toDataURL():'';
    DB.update('jobs',S.jobId,{
      pod_receiver_name:receiver,
      pod_signature:sigData,
      delivery_photo:S.podPhotoUrl||'',
      notes:$('pod_notes')?.value.trim()||'',
      delivery_status:'delivered',
      status:'completed',
      completed_at:new Date().toISOString(),
    });
    showToast('POD saved ✓','success');
    navigate('jobDetails',{jobId:S.jobId});
  }catch(e){
    showToast(e.message,'error');
    btn.disabled=false; btn.textContent='💾 Save Proof of Delivery';
  }
}

window.togglePassVis=function(inputId,btn){

  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';

window.updateRolePicker=function(){
  document.querySelectorAll('[name="um_role"]').forEach(radio=>{
    const div=radio.nextElementSibling;
    if(radio.checked){
      div.style.borderColor='var(--primary)'; div.style.background='#e0e7ff';
      div.querySelector('div:last-child').style.color='var(--primary)';
    } else {
      div.style.borderColor='var(--border)'; div.style.background='#fff';
      div.querySelector('div:last-child').style.color='var(--text-light)';
    }
  });
};

// Make role cards clickable
document.addEventListener('click',e=>{
  const div=e.target.closest('.role-btn');
  if(div){
    const radio=div.previousElementSibling;
    if(radio){ radio.checked=true; updateRolePicker(); }

window.closeUserModal=function(){
  const m=$('user-modal'); if(m) m.remove();
};

window.saveUser=function(userId){
  const name=$('um_name')?.value.trim();
  const email=$('um_email')?.value.trim();
  const pass=$('um_pass')?.value;
  const pass2=$('um_pass2')?.value;
  const role=document.querySelector('[name="um_role"]:checked')?.value||'driver';
  const status=$('um_status')?.value||'active';
  const phone=$('um_phone')?.value.trim()||'';
  const truck=$('um_truck')?.value||'';

  // Validation
  if(!name){ showToast('Full name is required','error'); return; }
  if(!email){ showToast('Email is required','error'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showToast('Enter a valid email address','error'); return; }

  const isEdit=!!userId;

  if(!isEdit && !pass){ showToast('Password is required for new users','error'); return; }
  if(pass && pass.length<6){ showToast('Password must be at least 6 characters','error'); return; }
  if(isEdit && pass && pass!==pass2){ showToast('Passwords do not match','error'); return; }

  // Check email not used by another user
  const existing=DB.all('users').find(u=>u.email.toLowerCase()===email.toLowerCase() && u.id!==userId);
  if(existing){ showToast('That email is already used by another account','error'); return; }

  if(isEdit){
    const patch={full_name:name,email,role,status,phone,truck_rego:truck};
    if(pass) patch.password=pass;
    DB.update('users',userId,patch);
    // Update assigned_driver in jobs if name changed
    const oldUser=DB.find('users',userId);
    showToast('User updated ✓','success');
    // If editing self, update session user
    if(userId===S.user.id) S.user={...S.user,...patch};
  } else {
    DB.add('users',{full_name:name,email,password:pass,role,status,phone,truck_rego:truck});
    showToast('User created ✓','success');
  }

  closeUserModal();
  renderDrivers($('pc'));
};

window.toggleUserStatus=function(userId,current){
  const next=current==='active'?'inactive':'active';
  DB.update('users',userId,{status:next});
  showToast(`User ${next==='active'?'activated':'deactivated'}`,'info');
  renderDrivers($('pc'));
};

window.deleteUser=function(userId){
  if(userId===S.user.id){ showToast("You can't delete your own account",'error'); return; }
  if(!confirm('Delete this user? This cannot be undone.')) return;
  DB.remove('users',userId);
  showToast('User deleted','info');
  renderDrivers($('pc'));
};

<script>
(function(){
  // Register service worker
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[PWA] Service worker registered, scope:', reg.scope))
        .catch(err => console.log('[PWA] SW registration failed:', err));
    });
  }

  // ── INSTALL BANNER ──────────────────────────────
  let deferredPrompt = null;
  const banner = document.createElement('div');
  banner.id = 'pwa-banner';
  banner.style.cssText = `
    position:fixed;bottom:70px;left:12px;right:12px;z-index:9999;
    background:linear-gradient(135deg,#7b1a00,#d94f00);
    color:#fff;border-radius:16px;padding:14px 16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.35);
    display:none;align-items:center;gap:12px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    animation:slideUp .4s ease;
  `;
  banner.innerHTML = `
    <img src="icons/icon-72x72.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0;" onerror="this.style.display='none'"/>
    <div style="flex:1;min-width:0;">
      <div style="font-size:14px;font-weight:700;margin-bottom:2px;">Install Galaxy Dispatch</div>
      <div style="font-size:12px;opacity:.85;">Add to home screen for quick access</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
      <button id="pwa-install-btn" style="background:#fff;color:#d94f00;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;">Install</button>
      <button id="pwa-dismiss-btn" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:5px 14px;font-size:12px;cursor:pointer;">Not now</button>
    </div>
  `;

  const style = document.createElement('style');
  style.textContent = '@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}';
  document.head.appendChild(style);

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Show banner after 3 seconds if not already dismissed
    if(!localStorage.getItem('pwa_dismissed')){
      setTimeout(() => {
        document.body.appendChild(banner);
        banner.style.display = 'flex';
      }, 3000);
    }
  });

  document.addEventListener('click', e => {
    if(e.target && e.target.id === 'pwa-install-btn'){
      if(deferredPrompt){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choice => {
          if(choice.outcome === 'accepted') console.log('[PWA] User installed the app');
          deferredPrompt = null;
          banner.style.display = 'none';
        });
      }
    }
    if(e.target && e.target.id === 'pwa-dismiss-btn'){
      banner.style.display = 'none';
      localStorage.setItem('pwa_dismissed', '1');
      // Re-show after 7 days
      setTimeout(() => localStorage.removeItem('pwa_dismissed'), 7*24*60*60*1000);
    }
  });

  window.addEventListener('appinstalled', () => {
    banner.style.display = 'none';
    console.log('[PWA] App installed successfully!');
  });

  // ── iOS INSTALL HINT (Safari doesn't support beforeinstallprompt) ──
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

  if(isIOS && !isInStandaloneMode && !localStorage.getItem('ios_hint_shown')){
    setTimeout(() => {
      const hint = document.createElement('div');
      hint.style.cssText = `
        position:fixed;bottom:70px;left:12px;right:12px;z-index:9999;
        background:#1c1c1e;color:#fff;border-radius:16px;padding:16px;
        box-shadow:0 4px 20px rgba(0,0,0,0.4);
        font-family:-apple-system,sans-serif;animation:slideUp .4s ease;
      `;
      hint.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
          <div style="font-size:15px;font-weight:700;">📲 Install Galaxy Dispatch</div>
          <button onclick="this.closest('div[style]').remove();localStorage.setItem('ios_hint_shown','1');"
            style="background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:0;margin-top:-4px;">✕</button>
        </div>
        <div style="font-size:13px;color:#aaa;line-height:1.6;">
          To install on your iPhone:<br/>
          1. Tap the <strong style="color:#fff;">Share button</strong> <span style="font-size:16px;">⎙</span> at the bottom of Safari<br/>
          2. Scroll down and tap <strong style="color:#fff;">"Add to Home Screen"</strong><br/>
          3. Tap <strong style="color:#fff;">"Add"</strong> — done! 🎉
        </div>
      `;
      document.body.appendChild(hint);
      localStorage.setItem('ios_hint_shown','1');
    }, 4000);
  }

})();
</script>
